name: letterquest_kids
description: Application éducative ludique pour enfants (6-12 ans) - apprentissage des lettres et mots
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.3
  google_mlkit_commons: ^0.11.0
  google_mlkit_digital_ink_recognition: ^0.14.2
  google_mlkit_text_recognition: ^0.15.1
  google_mlkit_translation: ^0.13.1
  google_mlkit_object_detection: ^0.15.1
  google_mlkit_image_labeling: ^0.14.2
  google_mlkit_face_detection: ^0.13.2
  path_provider: ^2.1.5
  flutter_tts: ^4.0.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.0.0
  hive_flutter: ^1.1.0
  provider: ^6.1.0
  go_router: ^13.0.0
  camera: ^0.10.6
  share_plus: ^13.1.0
  gal: ^2.3.2
  audioplayers: ^6.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/sounds/